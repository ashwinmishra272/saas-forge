spring.datasource.url=jdbc:postgresql://localhost:5432/saasforge
spring.datasource.username=postgres
spring.datasource.password=postgres

# Change from 'create' to 'validate'
# validate = Hibernate checks schema matches entities but never touches it
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway config
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Swagger UI path
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# Allow Swagger through security
springdoc.swagger-ui.disable-swagger-default-url=true

# CORS allowed origins (comma separated)
cors.allowed-origins=http://localhost:3000,http://localhost:4200,http://localhost:5173

jwt.secret=supersecretkey
server.port=8080
