# =====================
# PROD PROFILE
# All sensitive values come from ENVIRONMENT VARIABLES
# Never hardcode secrets here
# =====================

# Database ? from environment variables
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

# JWT ? from environment variables
jwt.secret=${JWT_SECRET}

# Token expiry ? shorter in prod for security
jwt.access-token-expiry=900000
jwt.refresh-token-expiry=604800000

# Logging ? only important things in prod
logging.level.com.saasforge=INFO
logging.level.org.springframework.security=WARN
logging.level.root=WARN

# Swagger ? disable in production (don't expose API docs publicly)
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

# CORS ? your real frontend domain
cors.allowed-origins=*
