# =====================
# DEV PROFILE
# Local development only ? never used in production
# =====================

# Database ? local PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/saasforge
spring.datasource.username=postgres
spring.datasource.password=postgres

# Show SQL in console for debugging
spring.jpa.show-sql=true

# JWT ? dev secret (weak is fine for local)
jwt.secret=dev-secret-key-only-for-local-development-not-secure

# Token expiry ? longer in dev so you don't keep logging in
jwt.access-token-expiry=86400000
jwt.refresh-token-expiry=604800000

# CORS ? allow everything in dev (Postman, browsers, etc.)
cors.allowed-origins=http://localhost:3000,http://localhost:4200,http://localhost:5173,http://localhost:8080,null

# Logging ? verbose in dev
logging.level.com.saasforge=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
